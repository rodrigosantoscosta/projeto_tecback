spring.application.name=oficina

# --- DATABASE CONFIGURATION (H2) ---
spring.datasource.url=jdbc:h2:mem:oficinadb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (Acesse em: localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- JPA / HIBERNATE ---
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyHbmImpl
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Jackson
spring.jackson.serialization.fail-on-empty-beans=false

# --- LOGGING ---
logging.level.root=INFO
logging.level.br.com.oficina=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level [%15.15thread] %-40.40logger{39} : %msg%n

# Arquivo de logs
logging.file.name=logs/oficina.log
logging.file.max-size=10MB
logging.file.max-history=7


logging.level.org.hibernate=WARN
logging.level.org.springframework=INFO
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=WARN

spring.profiles.active=docker