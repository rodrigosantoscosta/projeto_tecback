# ──────────────────────────────────────────────────────────────
# Perfil Railway — sobrescreve as configs de localhost
# Ativado via SPRING_PROFILES_ACTIVE=railway
# ──────────────────────────────────────────────────────────────

# Conexão PostgreSQL usando variáveis injetadas pelo Railway
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway — migrations automáticas no startup
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Desabilita DDL auto (Flyway gerencia o schema)
spring.jpa.hibernate.ddl-auto=validate

# Logs no Volume persistente do Railway
logging.file.name=/data/logs/oficina.log
logging.file.max-size=10MB
logging.file.max-history=7
app.volume.path=${APP_VOLUME_PATH:/data}

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=3600000
app.security.enabled=true
