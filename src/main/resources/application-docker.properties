# --- DATABASE (H2 em memória) ---
spring.datasource.url=jdbc:h2:mem:oficinadb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- H2 Console ---
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# --- JPA / HIBERNATE ---
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyHbmImpl
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# --- FLYWAY DESABILITADO (H2 usa ddl-auto) ---
spring.flyway.enabled=false

# --- JWT (valor default para ambiente local/docker) ---
jwt.secret=docker-local-secret-nao-usar-em-producao-minimo-32-chars
jwt.expiration-ms=3600000
app.security.enabled=true

# --- LOGGING ---
logging.level.root=INFO
logging.level.br.com.oficina=DEBUG
logging.level.org.hibernate=WARN
logging.level.org.springframework=INFO
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level [%15.15thread] %-40.40logger{39} : %msg%n
logging.file.name=logs/oficina.log
logging.file.max-size=10MB
logging.file.max-history=7
